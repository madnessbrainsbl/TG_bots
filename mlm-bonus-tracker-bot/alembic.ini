# A generic, single database configuration.

[alembic]
# путь к env.py
script_location = alembic
# where to store migration logs
version_locations = alembic/versions

# Default DB URL. Для SQLite или PostgreSQL
# Важно: реальное значение берется из .env через env.py (DB_URL).
# Этот fallback нужен только если .env нет.
sqlalchemy.url = sqlite+aiosqlite:///bot.db

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
